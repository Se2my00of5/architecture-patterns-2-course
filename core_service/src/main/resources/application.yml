spring:
  application:
    name: core_service
  datasource:
    url: jdbc:postgresql://localhost:2221/core_service_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}

server:
  port: 1111

security:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}

integration:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:1115}
    oauth:
      client-id: ${SERVICE_CLIENT_ID:service-client}
      client-secret: ${SERVICE_CLIENT_SECRET:service-client-secret}
  cbr:
    base-url: ${CBR_BASE_URL:https://www.cbr-xml-daily.ru}
    daily-json-path: ${CBR_DAILY_JSON_PATH:/daily_json.js}
    cache-ttl-seconds: ${CBR_CACHE_TTL_SECONDS:3600}

app:
  bank:
    master-account-id: ${BANK_MASTER_ACCOUNT_ID:00000000-0000-0000-0000-000000000001}
    master-account-initial-balance-minor: ${BANK_MASTER_ACCOUNT_INITIAL_BALANCE_MINOR:10000000}
  kafka:
    topics:
      account-operations: ${KAFKA_ACCOUNT_OPERATIONS_TOPIC:account-operations}
      operation-created: ${KAFKA_OPERATION_CREATED_TOPIC:operation-created}
