services:
  notification_service:
    build:
      context: ..
      dockerfile: notification_service/Dockerfile
    container_name: notification-service-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://notification_service_db:5432/notification_service_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - FIREBASE_CREDENTIALS_PATH=/app/service-account.json
      - FIREBASE_ENABLED=true
    ports:
      - "1116:1116"
    depends_on:
      notification_service_db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - bank_network

  notification_service_db:
    image: postgres:17-alpine
    container_name: notification_service_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=notification_service_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "2226:5432"
    volumes:
      - postgres_data_notification_service:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bank_network

volumes:
  postgres_data_notification_service:
