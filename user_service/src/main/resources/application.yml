spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:2225/user_service_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 1115

security:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}
    private-key: ${JWT_PRIVATE_KEY}

oauth2:
  auth-server:
    issuer-uri: http://localhost:1115
    clients:
      frontend:
        client-id: ${OAUTH_FRONTEND_CLIENT_ID:frontend-app}
        client-secret: ${OAUTH_FRONTEND_CLIENT_SECRET:frontend-app-secret}
        redirect-uri: ${OAUTH_FRONTEND_REDIRECT_URI:http://localhost:3000/login/oauth2/code/frontend-app}


